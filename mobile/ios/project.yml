name: OpenSourceOrthoLite
options:
  bundleIdPrefix: com.opensourceortho
  deploymentTarget:
    iOS: "16.0"
packages:
  OpenSourceOrthoLite:
    path: .
targets:
  OpenSourceOrthoLite:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: OpenSourceOrthoLite
        product: OpenSourceOrthoLiteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.opensourceortho.lite
        PRODUCT_NAME: OpenSourceOrthoLite
        INFOPLIST_FILE: App/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
schemes:
  OpenSourceOrthoLite:
    build:
      targets:
        OpenSourceOrthoLite: all
    run:
      config: Debug
    test:
      config: Debug
      targets: []
