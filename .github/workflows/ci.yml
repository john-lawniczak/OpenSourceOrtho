name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests + maintainability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q
      - name: Maintainability
        run: python tools/check_maintainability.py --strict

  js:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Core tests
        working-directory: ui
        run: node --test

  mesh-processing:
    name: Open3D robust shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mesh-processing extra
        run: pip install -e ".[dev,mesh-processing]"
      - name: Robust shell backend tests
        run: pytest tests/test_shell_backend.py tests/test_validation_benchmarks.py -q

  e2e:
    name: 3D viewer smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,e2e]"
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Viewer smoke
        run: pytest tests/e2e -q
